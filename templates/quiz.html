<!DOCTYPE html>
<html class="dark" lang="en font-body-md">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PyAdapt - Quiz</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#e1e2eb",
                        "on-secondary": "#263143",
                        "primary-fixed-dim": "#acc7ff",
                        "border": "#30363d",
                        "secondary-container": "#3e495d",
                        "tertiary-container": "#d37b02",
                        "on-tertiary-fixed": "#2d1600",
                        "on-primary-fixed": "#001a40",
                        "inverse-on-surface": "#2e3037",
                        "on-surface": "#e1e2eb",
                        "success": "#22c55e",
                        "outline": "#8c909e",
                        "tertiary-fixed-dim": "#ffb873",
                        "tertiary-fixed": "#ffdcbf",
                        "primary": "#acc7ff",
                        "on-secondary-fixed-variant": "#3c475a",
                        "secondary-fixed": "#d8e3fb",
                        "error-container": "#93000a",
                        "surface-container-highest": "#32353c",
                        "primary-fixed": "#d7e2ff",
                        "surface-container-lowest": "#0b0e14",
                        "primary-container": "#508ff8",
                        "tertiary": "#ffb873",
                        "on-primary": "#002f68",
                        "inverse-primary": "#005bbf",
                        "on-tertiary": "#4b2800",
                        "surface-bright": "#373940",
                        "secondary": "#bcc7de",
                        "on-primary-fixed-variant": "#004492",
                        "on-secondary-container": "#aeb9d0",
                        "background": "#0f1117",
                        "inverse-surface": "#e1e2eb",
                        "secondary-fixed-dim": "#bcc7de",
                        "surface-dim": "#11131a",
                        "on-secondary-fixed": "#111c2d",
                        "surface-container-high": "#272a31",
                        "surface-container": "#1d2026",
                        "on-surface-variant": "#c2c6d5",
                        "on-primary-container": "#00285b",
                        "on-error": "#690005",
                        "outline-variant": "#424753",
                        "surface-tint": "#acc7ff",
                        "surface-variant": "#32353c",
                        "warning": "#f59e0b",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#412200",
                        "on-tertiary-fixed-variant": "#6a3b00",
                        "danger": "#ef4444",
                        "surface-container-low": "#191c22",
                        "surface": "#161b22",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin": "32px",
                        "sidebar-width": "64px",
                        "stack-gap": "16px",
                        "gutter": "24px",
                        "content-max-width": "1200px"
                    },
                    "fontFamily": {
                        "body-md": ["Geist"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg": ["Geist"],
                        "body-lg": ["Geist"],
                        "headline-md": ["Geist"],
                        "code-md": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "code-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex font-body-md text-body-md overflow-x-hidden selection:bg-primary selection:text-on-primary-fixed">
    <!-- SideNavBar -->
    <nav class="fixed left-0 top-0 h-full flex flex-col justify-between py-margin z-40 bg-surface-container-lowest dark:bg-surface-container-lowest w-sidebar-width border-r border-border dark:border-border">
        <div class="flex flex-col items-center gap-6">
            <!-- Brand -->
            <div class="text-headline-md font-headline-md font-black text-primary dark:text-primary tracking-tighter mb-8" title="PyAdapt Python Learning">
                P
            </div>
            <!-- Navigation Items -->
            <!-- Dashboard -->
            <a class="{% if active_tab == 'dashboard' %}text-primary dark:text-primary font-bold border-l-2 border-primary pl-2 opacity-100 scale-100 bg-surface-container-highest{% else %}text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors group{% endif %} flex flex-col items-center justify-center p-4 w-full" href="/" title="Dashboard">
                <span class="material-symbols-outlined {% if active_tab == 'dashboard' %}text-primary{% else %}transition-transform group-hover:scale-110{% endif %}" {% if active_tab == 'dashboard' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>dashboard</span>
            </a>
            <!-- Current Lesson -->
            <a class="{% if active_tab == 'lesson' %}text-primary dark:text-primary font-bold border-l-2 border-primary pl-2 opacity-100 scale-100 bg-surface-container-highest{% else %}text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors group{% endif %} flex flex-col items-center justify-center p-4 w-full" href="{% if current_focus.video_id %}/lesson/{{ current_focus.video_id }}{% else %}#{% endif %}" title="Current Lesson">
                <span class="material-symbols-outlined {% if active_tab == 'lesson' %}text-primary{% else %}transition-transform group-hover:scale-110{% endif %}" {% if active_tab == 'lesson' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>auto_stories</span>
            </a>
            <!-- Progress -->
            <a class="{% if active_tab == 'progress' %}text-primary dark:text-primary font-bold border-l-2 border-primary pl-2 opacity-100 scale-100 bg-surface-container-highest{% else %}text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors group{% endif %} flex flex-col items-center justify-center p-4 w-full" href="/progress" title="Progress">
                <span class="material-symbols-outlined {% if active_tab == 'progress' %}text-primary{% else %}transition-transform group-hover:scale-110{% endif %}" {% if active_tab == 'progress' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>leaderboard</span>
            </a>
        </div>
        <!-- Bottom Items -->
        <div class="flex flex-col items-center">
            <div class="mt-4 p-2 rounded-full border border-border overflow-hidden">
                <img alt="User Profile Avatar" class="w-8 h-8 rounded-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBScg0RsoWZXW-6m4WSuoSn5twpmaUHFITEJRHRwwVOBczNj1Ti_yCm4MfFKqzwGL8agK0k_laryB3OpRHMgsFhoF-LR7WlnIfi5qWW7u1SuPPi9ILV-QJdZI3yDmF_-ft_e5E2w-UfEb2DjZkJozC8nX3v2uKmrtHjRfftyOFB0Ie5O4eW2M00ECWf2mkPEzkbbLLu2bG8DfsnpFjNwgbLPqKHh6n3cGrpCKRvOvZ21K_unxguO9D2K6JmU0Lffi52arYdv9Cbk_k"/>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div class="flex-1 ml-sidebar-width flex flex-col min-h-screen w-[calc(100%-64px)]">
        <header class="bg-background border-b border-border flex justify-between items-center h-16 px-gutter shrink-0">
            <div class="flex items-center gap-4">
                <span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">Active Quiz</span>
            </div>
        </header>

        <main class="flex-1 p-gutter flex flex-col items-center overflow-y-auto">
            <div class="w-full max-w-3xl mt-8 mb-16">
                <!-- Quiz Header -->
                <div class="flex flex-col gap-6">
                    <div class="flex items-baseline justify-between">
                        <h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Quiz — {{ topic.name }}</h1>
                        <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Question {{ q_index + 1 }} of {{ q_count }}</span>
                    </div>
                    <div class="w-full h-[4px] bg-surface-container-high rounded-full overflow-hidden">
                        <div class="h-full bg-primary rounded-full transition-all duration-500 ease-in-out" style="width: {{ progress_percent }}%;"></div>
                    </div>
                </div>

                <!-- Form container -->
                <form action="/quiz/{{ topic.id }}?q={{ q_index }}" method="POST" id="quiz_form">
                    <input type="hidden" name="selected_option" id="selected_option" value=""/>
                    
                    <div class="mt-margin">
                        <div class="bg-surface border border-border rounded-xl p-8 shadow-sm">
                            <div class="flex gap-4 items-start mb-8">
                                <span class="material-symbols-outlined text-primary text-[28px] shrink-0 mt-1">help</span>
                                <div class="font-body-lg text-body-lg text-on-surface leading-relaxed">
                                    {{ question.question_text }}
                                </div>
                            </div>
                            
                            <!-- Choices List -->
                            <div class="flex flex-col gap-3">
                                <!-- Option A -->
                                <button type="button" onclick="selectOption('A')" id="btn_A" class="w-full text-left flex items-center p-5 rounded-lg border border-border bg-surface hover:bg-surface-container-high hover:border-outline-variant transition-all group focus:outline-none focus:ring-2 focus:ring-primary">
                                    <div id="dot_A" class="w-4 h-4 rounded-full border border-outline-variant mr-5 shrink-0 group-hover:border-on-surface-variant transition-colors"></div>
                                    <span class="font-code-md text-code-md text-on-surface-variant group-hover:text-on-surface transition-colors">{{ question.option_a }}</span>
                                </button>
                                
                                <!-- Option B -->
                                <button type="button" onclick="selectOption('B')" id="btn_B" class="w-full text-left flex items-center p-5 rounded-lg border border-border bg-surface hover:bg-surface-container-high hover:border-outline-variant transition-all group focus:outline-none focus:ring-2 focus:ring-primary">
                                    <div id="dot_B" class="w-4 h-4 rounded-full border border-outline-variant mr-5 shrink-0 group-hover:border-on-surface-variant transition-colors"></div>
                                    <span class="font-code-md text-code-md text-on-surface-variant group-hover:text-on-surface transition-colors">{{ question.option_b }}</span>
                                </button>

                                <!-- Option C -->
                                <button type="button" onclick="selectOption('C')" id="btn_C" class="w-full text-left flex items-center p-5 rounded-lg border border-border bg-surface hover:bg-surface-container-high hover:border-outline-variant transition-all group focus:outline-none focus:ring-2 focus:ring-primary">
                                    <div id="dot_C" class="w-4 h-4 rounded-full border border-outline-variant mr-5 shrink-0 group-hover:border-on-surface-variant transition-colors"></div>
                                    <span class="font-code-md text-code-md text-on-surface-variant group-hover:text-on-surface transition-colors">{{ question.option_c }}</span>
                                </button>

                                <!-- Option D -->
                                <button type="button" onclick="selectOption('D')" id="btn_D" class="w-full text-left flex items-center p-5 rounded-lg border border-border bg-surface hover:bg-surface-container-high hover:border-outline-variant transition-all group focus:outline-none focus:ring-2 focus:ring-primary">
                                    <div id="dot_D" class="w-4 h-4 rounded-full border border-outline-variant mr-5 shrink-0 group-hover:border-on-surface-variant transition-colors"></div>
                                    <span class="font-code-md text-code-md text-on-surface-variant group-hover:text-on-surface transition-colors">{{ question.option_d }}</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Submission buttons -->
                    <div class="mt-margin flex justify-end">
                        <button type="submit" id="submit_btn" disabled class="opacity-50 cursor-not-allowed bg-primary text-on-primary-fixed font-label-sm text-label-sm uppercase tracking-wider px-8 py-3.5 rounded hover:bg-primary-fixed transition-all flex items-center gap-2 shadow-[0_4px_14px_rgba(172,199,255,0.15)]">
                            {% if is_last %}Submit Quiz{% else %}Next Question{% endif %}
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Interactive Options Handler -->
    <script>
        function selectOption(val) {
            // Set hidden field value
            document.getElementById('selected_option').value = val;
            
            // Enable submit button
            const submitBtn = document.getElementById('submit_btn');
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // Reset all buttons style
            const options = ['A', 'B', 'C', 'D'];
            options.forEach(opt => {
                const btn = document.getElementById('btn_' + opt);
                const dot = document.getElementById('dot_' + opt);
                const text = btn.querySelector('span');
                
                if (opt === val) {
                    // Selected state
                    btn.className = "w-full text-left flex items-center p-5 rounded-lg border border-primary bg-primary/10 shadow-[0_0_15px_rgba(172,199,255,0.05)] transition-all focus:outline-none focus:ring-2 focus:ring-primary relative overflow-hidden";
                    
                    // Add indicator strip
                    if (!btn.querySelector('.indicator-strip')) {
                        const strip = document.createElement('div');
                        strip.className = 'absolute left-0 top-0 bottom-0 w-1 bg-primary indicator-strip';
                        btn.appendChild(strip);
                    }
                    
                    dot.className = "w-4 h-4 rounded-full border-4 border-primary bg-background mr-5 shrink-0";
                    text.className = "font-code-md text-code-md text-primary-fixed-dim";
                } else {
                    // Deselect style
                    btn.className = "w-full text-left flex items-center p-5 rounded-lg border border-border bg-surface hover:bg-surface-container-high hover:border-outline-variant transition-all group focus:outline-none focus:ring-2 focus:ring-primary";
                    
                    // Remove indicator strip if exists
                    const strip = btn.querySelector('.indicator-strip');
                    if (strip) strip.remove();
                    
                    dot.className = "w-4 h-4 rounded-full border border-outline-variant mr-5 shrink-0 group-hover:border-on-surface-variant transition-colors";
                    text.className = "font-code-md text-code-md text-on-surface-variant group-hover:text-on-surface transition-colors";
                }
            });
        }
    </script>
</body>
</html>
